<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rasmitha Chinthalapally — AI & CS Engineer</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --navy: #050D1A;
    --cyan: #00D4FF;
    --white: #EEF2FF;
    --gray: #8896B3;
    --card-bg: rgba(15,25,50,0.75);
    --border: rgba(0,212,255,0.18);
    --cursor-color: #00D4FF;
    --cursor-ring: rgba(0,212,255,0.45);
    }

    body.light {
    --navy: #F2F5FC;
    --cyan: #1755C8;
    --white: #0D1526;
    --gray: #556070;
    --card-bg: rgba(255,255,255,0.9);
    --border: rgba(23,85,200,0.15);
    --cursor-color: #0D1526;
    --cursor-ring: rgba(13,21,38,0.3);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      overflow-x: hidden;
      cursor: none;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── LIGHT THEME OVERRIDES ── */
    body.light #bg-canvas {
      opacity: 0.1 !important;
      filter: saturate(0.3) hue-rotate(200deg);
    }

    body.light nav {
      background: rgba(242, 245, 252, 0.92) !important;
      border-bottom-color: rgba(23, 85, 200, 0.1) !important;
    }

    body.light #about,
    body.light #experience,
    body.light #skills,
    body.light #contact {
      background: rgba(226, 232, 248, 0.45) !important;
    }

    body.light #education,
    body.light #projects,
    body.light #hero {
      background: var(--navy) !important;
    }

    

    body.light .project-card {
      background: rgba(255, 255, 255, 0.88);
      border-color: rgba(23, 85, 200, 0.12);
    }

    body.light .card-desc {
      color: #556070;
    }

    body.light .tag {
      color: #556070;
      border-color: rgba(23, 85, 200, 0.15);
    }
    body.light footer {
      background: rgba(255, 255, 255, 0.55);
    }

    body.light .footer-title {
      color: #0D1526;
    }

    body.light .about-bio {
      color: #556070;
    }

    body.light .about-bio strong {
      color: #0D1526;
    }

    body.light .section-title {
      color: #0D1526;
    }

    body.light .hero-name {
      color: #0D1526;
    }

    body.light .hero-title {
      color: #556070;
    }

    body.light .hero-title strong {
      color: #0D1526;
    }

    body.light .btn-ghost {
      color: #0D1526;
      border-color: rgba(23, 85, 200, 0.2);
    }

    body.light .btn-ghost:hover {
      color: #1755C8;
      border-color: #1755C8;
    }

    body.light .btn-primary {
      background: #1755C8;
      color: #fff;
    }

    /* ── CURSOR — theme-aware, always visible ── */
    .cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      background: var(--cursor-color);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      /* no mix-blend-mode — use explicit color per theme */
    }

    .cursor-ring {
      position: fixed;
      width: 34px;
      height: 34px;
      border: 1.5px solid var(--cursor-ring);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.18s, width 0.18s, height 0.18s;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.55;
    }

    /* ── THEME TOGGLE — neat, minimal, contrasting ── */
    #theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      padding: 0;
      cursor: none;
      margin-left: 20px;
      flex-shrink: 0;
      outline: none;
    }

    .tt-circle {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(238, 242, 255, 0.1);
      border: 1.5px solid rgba(238, 242, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
      color: #EEF2FF;
    }

    body.light .tt-circle {
      background: rgba(13, 21, 38, 0.07);
      border: 1.5px solid rgba(13, 21, 38, 0.35);
      color: #0D1526;
    }

    #theme-toggle:hover .tt-circle {
      background: rgba(238, 242, 255, 0.18);
      border-color: rgba(238, 242, 255, 0.8);
      transform: scale(1.08);
    }

    body.light #theme-toggle:hover .tt-circle {
      background: rgba(13, 21, 38, 0.12);
      border-color: rgba(13, 21, 38, 0.6);
      transform: scale(1.08);
    }

    .tt-circle svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .tt-sun {
      display: none;
    }

    .tt-moon {
      display: block;
    }

    body.light .tt-sun {
      display: block;
    }

    body.light .tt-moon {
      display: none;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: flex-end;
      gap: 24px;
      align-items: center;
      padding: 16px 48px;
      backdrop-filter: blur(18px);
      background: rgba(5, 13, 26, 0.62);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--cyan);
      letter-spacing: -0.02em;
    }

    .nav-logo span {
      color: var(--white);
    }

    .nav-availability {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(70, 211, 105, 0.22);
      background: rgba(11, 36, 18, 0.72);
      color: #8ef0a7;
      box-shadow: inset 0 0 0 1px rgba(142, 240, 167, 0.04);
    }

    .nav-availability-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #46d369;
      box-shadow: 0 0 0 0 rgba(70, 211, 105, 0.55);
      animation: navPulse 1.8s ease-out infinite;
      flex-shrink: 0;
    }

    .nav-availability-text {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
      white-space: nowrap;
    }

    @keyframes navPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(70, 211, 105, 0.55);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(70, 211, 105, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(70, 211, 105, 0);
      }
    }

    nav ul {
      list-style: none;
      display: flex;
      margin-left: auto;
    gap: 24px;
    }

    nav a {
      color: var(--gray);
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover {
      color: var(--cyan);
    }

    body.light .nav-availability {
      background: rgba(230, 255, 236, 0.95);
      border-color: rgba(46, 160, 67, 0.22);
      color: #1f7a34;
    }

    section {
      position: relative;
      z-index: 1;
    }

    /* HERO */
#hero {
    min-height: 100vh;
    display: flex;
    position: relative;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 20px;
    --progress: 0;
    padding-top: 60px;
}
.scroll-down {
    position: absolute;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    z-index: 5;
    pointer-events: none;
}

.scroll-down-text {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 0.95rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.55);
}

.scroll-down-line {
    width: 2px;
    height: 70px;
    background: rgba(255, 255, 255, 0.25);
    position: relative;
    overflow: hidden;
}

.scroll-down-line::after {
    content: "";
    position: absolute;
    left: 0;
    top: -30px;
    width: 100%;
    height: 30px;
    background: #00d9ff;
    animation: scrollMove 1.8s ease-in-out infinite;
  
}

@media (max-width: 700px) {
  .scroll-down {
    display: none;
  }
}


body.light .scroll-down-text {
  color: rgba(13, 21, 38, 0.55);
}

body.light .scroll-down-line {
  background: rgba(13, 21, 38, 0.18);
}

body.light .scroll-down-line::after {
  background: #1755C8;
}

@keyframes scrollMove {
    0% {
        top: -30px;
        opacity: 0;
    }
    20% {
        opacity: 1;
    }
    100% {
        top: 100%;
        opacity: 0;
    }
}

  .hero-left {
    max-width: 860px;
    margin: 0 auto;
}



.hero-avatar {
   margin-top: 0px;
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
}

.hero-avatar img {
    width: 300px;
    max-width: 90%;
    height: auto;
    object-fit: contain;
    border-radius: 12px;
    display: block;
    margin: 0 auto;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    transition: transform 0.3s ease;
}

.hero-avatar img:hover {
    transform: translateY(-4px) scale(1.02);
}
    .hero-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.8rem, 5.5vw, 5rem);
      line-height: 1.05;
      animation: fadeUp 0.7s 0.1s ease both;
    }

    .hero-name .accent {
      color: var(--cyan);
    }

    .hero-title {
      font-size: 0.95rem;
      color: var(--gray);
      line-height: 1.9;
      animation: fadeUp 0.7s 0.2s ease both;
      max-width: 640px;
      margin: 18px auto 0;
    }

    .hero-title strong {
      color: var(--white);
    }

    

.hero-btns {
    display: flex;
    gap: 16px;
    margin-top: 40px;
    flex-wrap: wrap;
    justify-content: center;
}

    .btn-primary {
      background: var(--cyan);
      color: var(--navy);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      padding: 13px 28px;
      border: none;
      border-radius: 999px;
      cursor: none;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.18);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
    }

    .btn-ghost {
      background: transparent;
      color: var(--white);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      padding: 13px 28px;
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: none;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s, transform 0.2s;
    }

    .btn-ghost:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      transform: translateY(-3px);
    }


    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* SECTIONS COMMON */
    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 108px 60px;
    }

    .section-header {
      margin-bottom: 56px;
      
    }

    .section-tag {
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 12px;
      opacity: 0.88;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(2rem, 3.5vw, 3.8rem);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .accent-text {
      color: var(--cyan);
    }

    .section-text {
      max-width: 760px;
      font-size: 0.95rem;
      line-height: 1.9;
      color: var(--gray);
      margin-top: 20px;
    }

    .section-inner-wide {
      max-width: 100%;
      padding-left: 88px;
      padding-right: 56px;
    }

    .project-card,
    .exp-card,
    .skill-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 120%), var(--card-bg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
    }

    .section-line {
      width: 48px;
      height: 3px;
      background: var(--cyan);
      margin-top: 16px;
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
   
    /* ABOUT */
    #about,
    #experience,
    #skills {
      background: var(--surface-soft);
    }

    #education,

      background: var(--navy);
    }

#about .section-tag {

    .about-bio p+p {

.about-stats {

.about-stat {

.about-stat-num {

    /* EDUCATION */

.education-section {
  position: relative;
}

.education-head {
  max-width: 700px;
  margin-bottom: 38px;
}


.education-cards {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 24px;
  align-items: stretch;
}

}

.education-card:hover {

}

.education-card-logo {

}

.education-card-logo img {

}

.education-card-content {

.education-card-degree {

.education-card-school {

    /* EXPERIENCE */

.exp-role {

.exp-place {

}

.exp-date {

.exp-stat-num {

.exp-stat-label {

}

/* LEFT SIDE */
.skills-left {
  max-width: 700px;

  top: 120px; /* keeps it fixed while scrolling */
}

/* RIGHT SIDE */
.skills-right {
  width: 100%;
  display: flex;
  justify-content: center;   /* center horizontally */
  align-items: center;
}

/* toggle */
.skills-toggle {
  position: relative;
  display: flex;
  flex-wrap: nowrap;
  justify-content: flex-start;
  gap: 10px;
  margin: 0 auto;
}

.toggle-btn {
  background: rgba(255, 255, 255, 0.04);
  color: var(--white);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 10px 18px;
  font-family: 'Syne', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: 0.25s ease;
  cursor: none;
  white-space: nowrap;
}

.toggle-btn:hover {
  border-color: rgba(0, 212, 255, 0.35);
  color: var(--cyan);
  transform: translateY(-2px);
}

.toggle-btn.active {
  background: var(--cyan);
  color: var(--navy);
  border-color: var(--cyan);
  box-shadow: 0 8px 24px rgba(0, 212, 255, 0.18);
}

/* skills area */
.skills-box {
  width: 100%;
  margin: 0 auto;
  display: flex;
  justify-content: center;
}

/* IMPORTANT: default hide all lists */
.skills-box > ul {
  display: none;
  width: fit-content;
  margin: 0 auto;
  padding: 0;
  list-style: none;
}


/* if JS adds active to skills-box, keep this harmless */
.skills-box.active > ul:first-child {
  display: none;
}

/* card grid for all lists */
.languages-list,
.cloud-list,
.data-list,
.machine-learning-list,
.tools-list {
  display: grid;
  grid-template-columns: repeat(4, 116px);
  gap: 18px;
  justify-content: center;
}


/* card */
.skill-card {
  position: relative;
  width: 90px;
  height: 90px;
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
  transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  cursor: none;
}

.skill-card:hover {
  transform: translateY(-6px);
  border-color: rgba(0, 212, 255, 0.28);
  box-shadow: var(--shadow-strong), 0 0 0 1px rgba(0, 212, 255, 0.1);
}

.card-icon {

  align-items: center;
  justify-content: center;
}

.card-icon img {
  width: 50px;
  height: 50px;

  display: block;
}

/* tooltip */
.skill-card .tooltip {
  position: absolute;
  top: -42px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--cyan);
  color: var(--navy);
  font-size: 0.72rem;
  font-weight: 700;
  padding: 6px 10px;
  border-radius: 8px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  box-shadow: 0 10px 24px rgba(0, 212, 255, 0.18);
  transition: 0.25s ease;
  z-index: 5;
}

.skill-card:hover .tooltip {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

</head>

<body>
  <div class="cursor" id="cursor"></div>

  <button id="chatbotFab" class="chatbot-fab" type="button" aria-haspopup="dialog" aria-controls="chatbotDialog" aria-expanded="false">
    <i class="fa-solid fa-robot" aria-hidden="true"></i>
    <span class="chatbot-fab-text">
      <span class="chatbot-fab-label">Assistant</span>

    </span>
  </button>
  <div id="chatbotDialog" class="chatbot-dialog" role="dialog" aria-modal="false" aria-label="Portfolio assistant" aria-hidden="true">
      <button id="chatbotDialogClose" class="chatbot-dialog-close" type="button" aria-label="Close assistant">
        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
      </button>
    <iframe class="chatbot-frame" src="Chatbot.html" title="Rasmitha portfolio assistant"></iframe>
  </div>
  <script src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js" data-cfasync="false"></script>
  <script src="scripts/loadSections.js"></script>
  <script>
    document.addEventListener('sectionsLoaded', () => {
      //Skills
      const toggleBtns = document.querySelectorAll('[data-toggle-btn]');

  const skillLists = [
    document.querySelector('.languages-list'),
    document.querySelector('.cloud-list'),
    document.querySelector('.data-list'),
    document.querySelector('.machine-learning-list'),
    document.querySelector('.tools-list')
  ];

  skillLists.forEach((list, index) => {
    if (!list) return;
    list.style.display = index === 0 ? 'grid' : 'none';
  });

      toggleBtns.forEach((btn, index) => {
        btn.addEventListener('click', () => {

      toggleBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      skillLists.forEach((list, i) => {
        if (!list) return;
        list.style.display = i === index ? 'grid' : 'none';
      });

        });
      });

      // Cursor
      const cursor = document.getElementById('cursor'), ring = document.getElementById('cursorRing');
      let mx = 0, my = 0, rx = 0, ry = 0;
      document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursor.style.left = mx + 'px'; cursor.style.top = my + 'px'; });
      (function animRing() { rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12; ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; requestAnimationFrame(animRing); })();
      document.querySelectorAll('a,button,input,.project-card').forEach(el => {
        el.addEventListener('mouseenter', () => { ring.style.width = '54px'; ring.style.height = '54px'; });
        el.addEventListener('mouseleave', () => { ring.style.width = '34px'; ring.style.height = '34px'; });
      });

      // Neural net canvas
      const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
      let W, H, nodes = [];
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize(); window.addEventListener('resize', resize);
      function makeNodes(n) { nodes = []; for (let i = 0; i < n; i++)nodes.push({ x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - .5) * .4, vy: (Math.random() - .5) * .4, r: Math.random() * 2 + 1 }); }
      makeNodes(70);
      function drawNet() {
        ctx.clearRect(0, 0, W, H);
        const maxDist = 160;
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y, d = Math.sqrt(dx * dx + dy * dy);
            if (d < maxDist) { ctx.beginPath(); ctx.moveTo(nodes[i].x, nodes[i].y); ctx.lineTo(nodes[j].x, nodes[j].y); ctx.strokeStyle = `rgba(0,180,255,${(1 - d / maxDist) * .22})`; ctx.lineWidth = .6; ctx.stroke(); }
          }
          ctx.beginPath(); ctx.arc(nodes[i].x, nodes[i].y, nodes[i].r, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0,212,255,0.45)'; ctx.fill();
          nodes[i].x += nodes[i].vx; nodes[i].y += nodes[i].vy;
          if (nodes[i].x < 0 || nodes[i].x > W) nodes[i].vx *= -1;
          if (nodes[i].y < 0 || nodes[i].y > H) nodes[i].vy *= -1;
        }
        requestAnimationFrame(drawNet);
      }
      drawNet();

      // Scroll reveal
      const obs = new IntersectionObserver(entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }), { threshold: 0.12 });
      document.querySelectorAll('.reveal').forEach(r => obs.observe(r));

      // ─── THEME TOGGLE ───
      const themeToggle = document.getElementById('theme-toggle');
      const chatbotFrame = document.querySelector('.chatbot-frame');
      let isLight = false;

      function syncChatbotTheme() {
        chatbotFrame?.contentWindow?.postMessage(
          { type: 'portfolio-theme', theme: isLight ? 'light' : 'dark' },
          window.location.origin
        );
      }

      function applyTheme(light) {
        isLight = light;
        document.body.classList.toggle('light', isLight);
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        syncChatbotTheme();
      }

      chatbotFrame?.addEventListener('load', syncChatbotTheme);

      if (themeToggle) {
        themeToggle.addEventListener('click', () => applyTheme(!isLight));
      }

      // Restore saved theme on load so user's choice persists across refreshes
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        applyTheme(true);
      } else if (savedTheme === 'dark') {
        applyTheme(false);
      } else {
        applyTheme(false);
      }
    });
  </script>
  <script>
    // Contact form submission handler (uses Formspree by default).
    (function () {
      function initContact() {
        const form = document.getElementById('contactForm');
        if (!form) return false;
        const endpoint = form.dataset.endpoint || '';
        const status = document.getElementById('contactStatus');
        const btn = form.querySelector('button[type="submit"]');

        function showModal(message) {
          let modal = document.getElementById('formModal');
          if (!modal) return;
          modal.querySelector('.modal-body').textContent = message;
          modal.classList.add('open');
          modal.setAttribute('aria-hidden', 'false');
        }

        function hideModal() {
          const modal = document.getElementById('formModal');
          if (!modal) return;
          modal.classList.remove('open');
          modal.setAttribute('aria-hidden', 'true');
        }

        // close modal on click or Escape
        document.addEventListener('click', (e) => {
          const modal = document.getElementById('formModal');
          if (!modal) return;
          if (e.target === modal || e.target.closest('.modal-close')) hideModal();
        });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') hideModal(); });

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          status.textContent = '';
          btn.disabled = true;

          const payload = {
            name: form.fullName?.value || '',
            email: form.email?.value || '',
            message: form.message?.value || ''
          };

          if (!payload.name || !payload.email || !payload.message) {
            status.textContent = 'Please complete all required fields.';
            btn.disabled = false;
            return;
          }

          if (!endpoint || endpoint.includes('YOUR_FORM_ID')) {
            status.textContent = 'Please set your Formspree endpoint in the form data-endpoint attribute (see README).';
            btn.disabled = false;
            return;
          }

          try {
            const res = await fetch(endpoint, {
              method: 'POST',
              headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (res.ok) {
              status.textContent = 'Message sent — thank you!';
              form.reset();
              showModal('Form submitted — thank you for your message. I will reply soon.');
            } else {
              const json = await res.json().catch(() => null);
              const msg = (json && (json.error || json.message)) || 'Submission failed. Try again later.';
              status.textContent = msg;
              showModal(msg);
            }
          } catch (err) {
            status.textContent = 'Network error. Try again later.';
            showModal('Network error. Please try again later.');
          } finally {
            btn.disabled = false;
          }
        });

        return true;
      }

      // Try to init immediately; if sections are loaded later, init on that event.
      if (!initContact()) {
        document.addEventListener('sectionsLoaded', initContact);
      }
    })();
  </script>
  <script>
    (function () {
      const fab = document.getElementById('chatbotFab');
      const dialog = document.getElementById('chatbotDialog');
      const closeBtn = document.getElementById('chatbotDialogClose');
      if (!fab || !dialog || !closeBtn) return;

      function setOpen(open) {
        dialog.classList.toggle('open', open);
        dialog.setAttribute('aria-hidden', open ? 'false' : 'true');
        fab.setAttribute('aria-expanded', open ? 'true' : 'false');
      }

      fab.addEventListener('click', () => {
        const shouldOpen = !dialog.classList.contains('open');
        setOpen(shouldOpen);
      });

      closeBtn.addEventListener('click', () => setOpen(false));

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          setOpen(false);
        }
      });

      document.addEventListener('click', (event) => {
        if (!dialog.classList.contains('open')) return;
        if (dialog.contains(event.target) || fab.contains(event.target)) return;
        setOpen(false);
      });
    })();
  </script>
  <!-- Submission modal -->
  <div id="formModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-title"><strong>Form Submitted</strong></div>
      <div class="modal-body">Thank you — your message was sent.</div>
      <button class="modal-close" type="button" aria-label="Close dialog">Close</button>
    </div>
  </div>

</script>
