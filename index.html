<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rasmitha Chinthalapally — AI & CS Engineer</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --navy: #050D1A;
      --blue: #1A4FD8;
      --cyan: #00D4FF;
      --white: #EEF2FF;
      --gray: #8896B3;
      --card-bg: rgba(15, 25, 50, 0.75);
      --border: rgba(0, 212, 255, 0.18);
      --cursor-color: #00D4FF;
      --cursor-ring: rgba(0, 212, 255, 0.45);
      --cursor-blend: normal;
    }

    body.light {
      --navy: #F2F5FC;
      --blue: #1A4FD8;
      --cyan: #1755C8;
      --white: #0D1526;
      --gray: #556070;
      --card-bg: rgba(255, 255, 255, 0.9);
      --border: rgba(23, 85, 200, 0.15);
      --cursor-color: #0D1526;
      --cursor-ring: rgba(13, 21, 38, 0.3);
      --cursor-blend: normal;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      overflow-x: hidden;
      cursor: none;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── LIGHT THEME OVERRIDES ── */
    body.light #bg-canvas {
      opacity: 0.1 !important;
      filter: saturate(0.3) hue-rotate(200deg);
    }

    body.light nav {
      background: rgba(242, 245, 252, 0.92) !important;
      border-bottom-color: rgba(23, 85, 200, 0.1) !important;
    }

    body.light #about,
    body.light #experience,
    body.light #skills,
    body.light #contact {
      background: rgba(226, 232, 248, 0.45) !important;
    }

    body.light #education,
    body.light #projects,
    body.light #hero {
      background: var(--navy) !important;
    }

    

    body.light .pub-card {
      background: rgba(255, 255, 255, 0.8);
      border-color: rgba(23, 85, 200, 0.12);
    }

    body.light .pub-meta {
      color: #556070;
    }

    body.light .tl-dot {
      background: var(--navy);
    }

    body.light .tl-desc,
    body.light .tl-place {
      color: #556070;
    }

    body.light .project-card {
      background: rgba(255, 255, 255, 0.88);
      border-color: rgba(23, 85, 200, 0.12);
    }

    body.light .card-desc {
      color: #556070;
    }

    body.light .tag {
      color: #556070;
      border-color: rgba(23, 85, 200, 0.15);
    }


    body.light .skill-bar-bg {
      background: rgba(0, 0, 0, 0.08);
    }

    body.light .skill-bar-fill {
      background: linear-gradient(90deg, #1A4FD8, #1755C8);
    }

    body.light .skill-group-title {
      color: #1755C8;
      border-bottom-color: rgba(23, 85, 200, 0.15);
    }

    body.light .skill-meta {
      color: #0D1526;
    }

    body.light .skill-pct {
      color: #556070;
    }

    body.light .contact-link {
      background: rgba(255, 255, 255, 0.8);
      border-color: rgba(23, 85, 200, 0.12);
      color: #0D1526;
    }

    body.light .contact-label {
      color: #556070;
    }

    body.light .about-bio {
      color: #556070;
    }

    body.light .about-bio strong {
      color: #0D1526;
    }

    body.light .section-title {
      color: #0D1526;
    }

    body.light .hero-name {
      color: #0D1526;
    }

    body.light .hero-title {
      color: #556070;
    }

    body.light .hero-title strong {
      color: #0D1526;
    }

    body.light .stat-label {
      color: #556070;
    }

    body.light .btn-ghost {
      color: #0D1526;
      border-color: rgba(23, 85, 200, 0.2);
    }

    body.light .btn-ghost:hover {
      color: #1755C8;
      border-color: #1755C8;
    }

    body.light .btn-primary {
      background: #1755C8;
      color: #fff;
    }

    body.light .hero-stats {
      border: none;
    }

    /* ── CURSOR — theme-aware, always visible ── */
    .cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      background: var(--cursor-color);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      /* no mix-blend-mode — use explicit color per theme */
    }

    .cursor-ring {
      position: fixed;
      width: 34px;
      height: 34px;
      border: 1.5px solid var(--cursor-ring);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.18s, width 0.18s, height 0.18s;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.55;
    }

    /* ── THEME TOGGLE — neat, minimal, contrasting ── */
    #theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      padding: 0;
      cursor: none;
      margin-left: 20px;
      flex-shrink: 0;
      outline: none;
    }

    .tt-circle {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(238, 242, 255, 0.1);
      border: 1.5px solid rgba(238, 242, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
      color: #EEF2FF;
    }

    body.light .tt-circle {
      background: rgba(13, 21, 38, 0.07);
      border: 1.5px solid rgba(13, 21, 38, 0.35);
      color: #0D1526;
    }

    #theme-toggle:hover .tt-circle {
      background: rgba(238, 242, 255, 0.18);
      border-color: rgba(238, 242, 255, 0.8);
      transform: scale(1.08);
    }

    body.light #theme-toggle:hover .tt-circle {
      background: rgba(13, 21, 38, 0.12);
      border-color: rgba(13, 21, 38, 0.6);
      transform: scale(1.08);
    }

    .tt-circle svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .tt-sun {
      display: none;
    }

    .tt-moon {
      display: block;
    }

    body.light .tt-sun {
      display: block;
    }

    body.light .tt-moon {
      display: none;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: flex-end;
      gap: 24px;
      align-items: center;
      padding: 18px 60px;
      backdrop-filter: blur(16px);
      background: rgba(5, 13, 26, 0.7);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--cyan);
      letter-spacing: -0.02em;
      align-items: right;
    }

    .nav-logo span {
      color: var(--white);
    }

    nav ul {
      list-style: none;
      display: flex;
      margin-left: auto;
    gap: 24px;
    }

    nav a {
      color: var(--gray);
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover {
      color: var(--cyan);
    }

    section {
      position: relative;
      z-index: 1;
    }

    /* HERO */
#hero {
    min-height: 100vh;
    display: flex;
    position: relative;
    justify-content: center;   /* center horizontally */
    align-items: center;       /* center vertically */
    text-align: center;        /* center text */
    padding: 0 20px;
    --progress: 0;
    padding-top: 60px;   /* 👈 prevents navbar overlap */

}
.scroll-down {
    position: absolute;
    right: 30px;
    bottom: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    z-index: 5;
    pointer-events: none;
}

.scroll-down-text {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 0.95rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.55);
}

.scroll-down-line {
    width: 2px;
    height: 70px;
    background: rgba(255, 255, 255, 0.25);
    position: relative;
    overflow: hidden;
}

.scroll-down-line::after {
    content: "";
    position: absolute;
    left: 0;
    top: -30px;
    width: 100%;
    height: 30px;
    background: #00d9ff;
    animation: scrollMove 1.8s ease-in-out infinite;
  
}


body.light .scroll-down-text {
  color: rgba(13, 21, 38, 0.55);
}

body.light .scroll-down-line {
  background: rgba(13, 21, 38, 0.18);
}

body.light .scroll-down-line::after {
  background: #1755C8;
}

@keyframes scrollMove {
    0% {
        top: -30px;
        opacity: 0;
    }
    20% {
        opacity: 1;
    }
    100% {
        top: 100%;
        opacity: 0;
    }
}

  .hero-left {
    max-width: 800px;
    margin: 0 auto;
}



.hero-avatar {
   margin-top: 0px;   /* 👈 pushes image down */
    margin-bottom: 30px;
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
}

/* Large rectangular image */
.hero-avatar img {
    width: 320px;          /* adjust size */
    max-width: 90%;
    height: auto;          /* IMPORTANT: prevents cropping */

    object-fit: contain;   /* ensures full image is visible */

    border-radius: 12px;

    display: block;
    margin: 0 auto;
    /* subtle shadow (optional but clean) */
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);

    transition: transform 0.3s ease;
}

/* subtle hover (optional) */
.hero-avatar img:hover {
    transform: translateY(-4px) scale(1.02);
}
    .hero-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.8rem, 5.5vw, 5rem);
      line-height: 1.05;

      animation: fadeUp 0.7s 0.1s ease both;
    }

    }

    .hero-title {

    }

    

.hero-btns {
    display: flex;
    gap: 16px;
    margin-top: 40px;
    flex-wrap: wrap;
    justify-content: center;
}

    .btn-primary {
      background: var(--cyan);
      color: var(--navy);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      padding: 13px 28px;
      border: none;
      border-radius: 3px;
      cursor: none;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
    }

    .btn-ghost {
      background: transparent;
      color: var(--white);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      padding: 13px 28px;
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: none;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s, transform 0.2s;
    }

    .btn-ghost:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      transform: translateY(-3px);
    }


    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--cyan);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.62rem;
      color: var(--gray);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* SECTIONS COMMON */
    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 100px 60px;
    
    }

    .section-header {
      margin-bottom: 56px;
      
    }

    .section-tag {

    .section-title {

    .section-line {

    .reveal {

    }

}

.education-head {

.education-kicker {

    /* TIMELINE */
    .timeline {

      padding-left: 36px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, var(--cyan), transparent);
    }

      position: relative;
      margin-bottom: 44px;
    }

    .tl-dot {
      position: absolute;
      left: -36px;

      height: 16px;

      background: var(--navy);
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
    }

    .tl-year {

    }

<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <canvas id="bg-canvas"></canvas>
  <div id="nav"></div>
  <div id="hero-slot"></div>
  <div id="about-slot"></div>
  <div id="education-slot"></div>
  <div id="experience-slot"></div>
  <div id="projects-slot"></div>
  <div id="skills-slot"></div>
  <div id="contact-slot"></div>
  <div id="footer-slot"></div>
  <div id="chatbot-slot"></div>
  <script src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js" data-cfasync="false"></script>
  <script src="scripts/loadSections.js"></script>
  <script>
    document.addEventListener('sectionsLoaded', () => {
      //Skills
      const toggleBtns = document.querySelectorAll('[data-toggle-btn]');

  const skillLists = [
    document.querySelector('.languages-list'),
    document.querySelector('.cloud-list'),
    document.querySelector('.data-list'),
    document.querySelector('.machine-learning-list'),
    document.querySelector('.tools-list')
  ];

  skillLists.forEach((list, index) => {
    if (!list) return;
    list.style.display = index === 0 ? 'grid' : 'none';
  });

  toggleBtns.forEach((btn, index) => {
    btn.addEventListener('click', () => {

      toggleBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      skillLists.forEach((list, i) => {
        if (!list) return;
        list.style.display = i === index ? 'grid' : 'none';
      });

    });
  });
      
      // Cursor
      const cursor = document.getElementById('cursor'), ring = document.getElementById('cursorRing');
      let mx = 0, my = 0, rx = 0, ry = 0;
      document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursor.style.left = mx + 'px'; cursor.style.top = my + 'px'; });
      (function animRing() { rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12; ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; requestAnimationFrame(animRing); })();
      document.querySelectorAll('a,button,input,.project-card').forEach(el => {
        el.addEventListener('mouseenter', () => { ring.style.width = '54px'; ring.style.height = '54px'; });
        el.addEventListener('mouseleave', () => { ring.style.width = '34px'; ring.style.height = '34px'; });
      });

      // Neural net canvas
      const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
      let W, H, nodes = [];
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize(); window.addEventListener('resize', resize);
      function makeNodes(n) { nodes = []; for (let i = 0; i < n; i++)nodes.push({ x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - .5) * .4, vy: (Math.random() - .5) * .4, r: Math.random() * 2 + 1 }); }
      makeNodes(70);
      function drawNet() {
        ctx.clearRect(0, 0, W, H);
        const maxDist = 160;
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y, d = Math.sqrt(dx * dx + dy * dy);
            if (d < maxDist) { ctx.beginPath(); ctx.moveTo(nodes[i].x, nodes[i].y); ctx.lineTo(nodes[j].x, nodes[j].y); ctx.strokeStyle = `rgba(0,180,255,${(1 - d / maxDist) * .22})`; ctx.lineWidth = .6; ctx.stroke(); }
          }
          ctx.beginPath(); ctx.arc(nodes[i].x, nodes[i].y, nodes[i].r, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0,212,255,0.45)'; ctx.fill();
          nodes[i].x += nodes[i].vx; nodes[i].y += nodes[i].vy;
          if (nodes[i].x < 0 || nodes[i].x > W) nodes[i].vx *= -1;
          if (nodes[i].y < 0 || nodes[i].y > H) nodes[i].vy *= -1;
        }
        requestAnimationFrame(drawNet);
      }
      drawNet();

      // Scroll reveal
      const obs = new IntersectionObserver(entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }), { threshold: 0.12 });
      document.querySelectorAll('.reveal').forEach(r => obs.observe(r));

      // ─── THEME TOGGLE ───
      const themeToggle = document.getElementById('theme-toggle');
      let isLight = false;

      function applyTheme(light) {
        isLight = light;
        document.body.classList.toggle('light', isLight);
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
      }

      themeToggle.addEventListener('click', () => applyTheme(!isLight));

      if (localStorage.getItem('theme') === 'light') applyTheme(true);
    });
  </script>
</body>
