<section id="contact">
  <div class="section-inner section-inner-wide contact-modern">
    <div class="contact-left reveal" aria-hidden="false">
      <div class="section-tag">Contact</div>
      <h2 class="section-title">Get in <span class="accent-text">Touch</span></h2>
      <div class="section-line" aria-hidden="true"></div>

      <p class="contact-subtitle">I’d love to hear from you.</p>

      <p class="contact-copy">
        If you have any inquiries, collaboration ideas, internship or full-time
        opportunities, feel free to reach out through the contact form or email.
      </p>

      <div class="contact-info-block">
  <a href="mailto:rasmithachinthalapally@gmail.com" class="contact-email" aria-label="Email">
    <i class="fa-solid fa-envelope contact-icon" aria-hidden="true"></i>
  </a>

  <div class="contact-socials" aria-label="Social links">
    <a href="https://github.com/Rasmitha06" target="_blank" rel="noopener" class="contact-social" aria-label="GitHub">
      <i class="fa-brands fa-github contact-icon" aria-hidden="true"></i>
    </a>

    <a href="https://www.linkedin.com/in/rasmithach03/" target="_blank" rel="noopener" class="contact-social" aria-label="LinkedIn">
      <i class="fa-brands fa-linkedin-in contact-icon" aria-hidden="true"></i>
    </a>
  </div>
</div>
</div>
    <div class="contact-right">
      <form id="contactForm" class="contact-form-modern" novalidate data-endpoint="https://formspree.io/f/xvzvloqr">
        <div class="contact-form-row">
          <div class="contact-field">
            <label for="fullName">Full name *</label>
            <input type="text" id="fullName" name="fullName" placeholder="Your name" required aria-required="true">
          </div>
        </div>

        <div class="contact-field">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" placeholder="you@domain.com" required aria-required="true">
        </div>

        <div class="contact-field">
          <label for="message">Message *</label>
          <textarea id="message" name="message" rows="6" placeholder="A short message about your project or idea" required aria-required="true"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="contact-send-btn">Send Message</button>
          <div id="contactStatus" class="contact-status" role="status" aria-live="polite"></div>
        </div>
      </form>
    </div>
  </div>
</section>
