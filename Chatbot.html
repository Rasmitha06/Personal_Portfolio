<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rasmitha's Portfolio Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050d1a;
    --surface: rgba(15, 25, 50, 0.82);
    --surface-soft: rgba(9, 18, 36, 0.92);
    --bubble-user: #00d4ff;
    --bubble-bot: rgba(255, 255, 255, 0.04);
    --text-primary: #eef2ff;
    --text-secondary: #8896b3;
    --text-user: #050d1a;
    --accent: #00d4ff;
    --accent-light: rgba(0, 212, 255, 0.08);
    --border: rgba(0, 212, 255, 0.18);
    --shadow: 0 20px 48px rgba(0, 0, 0, 0.28);
  }

  body.light {
    --bg: #f2f5fc;
    --surface: rgba(255, 255, 255, 0.9);
    --surface-soft: rgba(242, 245, 252, 0.96);
    --bubble-user: #1755c8;
    --bubble-bot: rgba(23, 85, 200, 0.07);
    --text-primary: #0d1526;
    --text-secondary: #556070;
    --text-user: #ffffff;
    --accent: #1755c8;
    --accent-light: rgba(23, 85, 200, 0.08);
    --border: rgba(23, 85, 200, 0.15);
    --shadow: 0 16px 36px rgba(15, 23, 42, 0.14);
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background:
      radial-gradient(circle at top left, rgba(0, 212, 255, 0.08), transparent 32%),
      linear-gradient(180deg, #040b16 0%, #07111f 52%, #050d1a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100svh;
    padding: 0;
    color: var(--text-primary);
    transition: background 0.3s ease, color 0.3s ease;
  }

  .chat-wrapper {
    width: 100%;
    max-width: 420px;
    height: min(100vh, 620px);
    height: min(100svh, 620px);
    background: var(--surface);
    border-radius: 0;
    backdrop-filter: blur(16px);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .chat-header {
    background: var(--surface-soft);
    padding: 18px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), rgba(0, 212, 255, 0.65));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    color: var(--text-user);
    font-weight: 700;
    flex-shrink: 0;
  }

  .header-info h2 {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.01em;
  }

  .header-info p {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 400;
    margin-top: 2px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: #6ee7a0;
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 0 2px rgba(110,231,160,0.3);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 2px rgba(110,231,160,0.3); }
    50% { box-shadow: 0 0 0 5px rgba(110,231,160,0.1); }
  }

  /* Messages */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
    background: transparent;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 82%;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.bot { align-self: flex-start; }
  .message.user { align-self: flex-end; }

  .bubble {
    padding: 11px 15px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    font-weight: 400;
    border: 1px solid transparent;
  }

  .message.bot .bubble {
    background: var(--bubble-bot);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
    border-color: var(--border);
  }

  .message.user .bubble {
    background: var(--bubble-user);
    color: var(--text-user);
    border-bottom-right-radius: 4px;
  }

  .bubble a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .message.user .bubble a { color: #a8d5c0; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 12px 16px;
    background: var(--bubble-bot);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
    border: 1px solid var(--border);
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--text-secondary);
    border-radius: 50%;
    animation: typingBounce 1.2s ease infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .suggestions {
    padding: 0 18px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    flex-shrink: 0;
  }

  .suggestion-btn {
    background: var(--accent-light);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: 20px;
    padding: 6px 13px;
    font-size: 12.5px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.18s ease;
    white-space: nowrap;
    font-weight: 500;
  }

  .suggestion-btn:hover {
    background: var(--accent);
    color: var(--text-user);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .chat-input-area {
    padding: 14px 18px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
    background: var(--surface);
  }

  .chat-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text-primary);
    background: rgba(255, 255, 255, 0.02);
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .chat-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.12);
  }

  .chat-input::placeholder { color: var(--text-secondary); }

  .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--bubble-user);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s ease;
  }

  .send-btn:hover { background: #12bde2; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 18px; height: 18px; fill: var(--text-user); }
</style>
</head>
<body>
<div class="chat-wrapper">
  <div class="chat-header">
    <div class="avatar">R</div>
    <div class="header-info">
      <h2>Rasmitha's Assistant</h2>
      <p>Ask me anything about Rasmitha ✨</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion-btn" onclick="sendSuggestion(this)">👩‍💻 About Rasmitha</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">🛠️ Skills & Tech</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">📁 Projects</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">🎓 Education</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">📬 Contact</button>
  </div>

  <div class="chat-input-area">
    <textarea class="chat-input" id="chatInput" placeholder="Ask me anything about Rasmitha..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const conversationHistory = [{ role: 'user', content: 'Tell me about Rasmitha' },
  { role: 'assistant', content: '...' }];
let isLoading = false;

async function postToChatApi(messages) {
  const endpoints = ['/api/chat', '/chat'];
  const backendHostFallback = `${location.protocol}//${location.hostname}:3001/chat`;
  const localhostFallback = 'http://localhost:3001/chat';
  endpoints.push(backendHostFallback);
  if (location.hostname !== 'localhost') endpoints.push(localhostFallback);

  let lastError = null;

  for (const endpoint of endpoints) {
    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error || `Request failed (${response.status})`);
      return data;
    } catch (err) {
      lastError = err;
    }
  }

  throw lastError || new Error('Unable to reach chat API');
}

function addMessage(text, role, animate = true) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  if (!animate) div.style.animationDelay = '0s';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');
  div.appendChild(bubble);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing';
  div.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage(overrideText) {
  if (isLoading) return;

  const input = document.getElementById('chatInput');
  const text = overrideText || input.value.trim();
  if (!text) return;

  document.getElementById('suggestions').style.display = 'none';

  addMessage(text, 'user');
  conversationHistory.push({ role: 'user', content: text });

  input.value = '';
  input.style.height = 'auto';

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const data = await postToChatApi(conversationHistory);
    const reply = data.reply || "Sorry, I couldn't get a response right now.";

    hideTyping();
    addMessage(reply, 'bot');
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch (err) {
    console.error('Chatbot frontend error:', err);
    hideTyping();
    const details = err?.message ? `<br><small style="opacity:.8">(${err.message})</small>` : '';
    addMessage(`Oops! Something went wrong. Please try again in a moment. 😊${details}`, 'bot');
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function sendSuggestion(btn) {
  const text = btn.textContent.replace(/^[^\w]+/, '').trim();
  sendMessage(text);
}

function applyEmbeddedTheme(theme) {
  document.body.classList.toggle('light', theme === 'light');
}

window.addEventListener('message', (event) => {
  if (event.origin !== window.location.origin) return;
  if (event.data?.type !== 'portfolio-theme') return;
  applyEmbeddedTheme(event.data.theme);
});

// Auto-resize textarea
document.getElementById('chatInput').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

document.getElementById('chatInput').addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Welcome message
window.addEventListener('load', () => {
  try {
    const parentIsLight = window.parent && window.parent !== window && window.parent.document.body.classList.contains('light');
    applyEmbeddedTheme(parentIsLight ? 'light' : 'dark');
  } catch (error) {
    applyEmbeddedTheme('dark');
  }

  setTimeout(() => {
    addMessage("Hi there! 👋 I'm Rasmitha's assistant. I can tell you all about her background, skills, projects, and more. What would you like to know?", 'bot');
  }, 400);
});
</script>
</body>
</html>
